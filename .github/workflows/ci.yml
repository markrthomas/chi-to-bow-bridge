name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core iverilog pandoc texlive-latex-base texlive-latex-recommended texlive-xetex make
          python -m pip install --upgrade pip
          python -m pip install cocotb pytest

      - name: Doctor + full build
        run: make doctor && make

  # PLAN near-term #1 parity: OSS Verilator smoke (no Synopsys VCS license).
  vlate-bench:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Verilator and toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator build-essential make

      - name: Verilator lint + C++ parity TB
        run: |
          make -C vlate_bench lint
          make -C vlate_bench run

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog pandoc texlive-latex-base texlive-latex-recommended make
          python -m pip install --upgrade pip
          python -m pip install cocotb pytest

      - name: Doctor + full build
        run: make doctor && make
